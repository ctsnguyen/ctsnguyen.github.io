<!DOCTYPE html>
<html>
<head>
  <title>TrotTracker Heatmap</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
  <style> #map { height: 100vh; } </style>
</head>
<body>
  <div id="map"></div>
  <script>
    const map = L.map('map').setView([38.537071, -121.754943], 15);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    async function fetchHeatmap() {
      try {
        const res = await fetch('https://oceyuw1p02.execute-api.us-east-2.amazonaws.com/data'); 
        const data = await res.json();
        L.heatLayer(data, { radius: 25, blur: 30, maxZoom: 3, minOpacity: 0.4 }).addTo(map);
      } catch (err) {
        console.error(err);
      }
    }

    fetchHeatmap();
  </script>
</body>
</html>
